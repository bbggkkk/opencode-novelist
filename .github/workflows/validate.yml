name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run production validation suite
        run: make validate

  windows-install-smoke:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run PowerShell installer smoke test
        shell: pwsh
        run: |
          $env:HOME = Join-Path $env:RUNNER_TEMP "opencode-novelist-home"
          New-Item -ItemType Directory -Force -Path $env:HOME | Out-Null
          .\install.ps1 --global
          $target = Join-Path $env:HOME ".config/opencode/agents"
          $templateTarget = Join-Path $env:HOME ".config/opencode/novelist/templates"
          $skillTarget = Join-Path $env:HOME ".config/opencode/skills"
          $requiredAgents = @(
            "novelist.md",
            "novelist-writer.md",
            "novelist-editor.md",
            "novelist-researcher.md",
            "novelist-loremaster.md",
            "novelist-otaku.md",
            "novelist-publisher.md"
          )
          foreach ($path in $requiredAgents) {
            $fullPath = Join-Path $target $path
            if (-not (Test-Path $fullPath)) {
              throw "Missing installed file: $fullPath"
            }
          }
          if (Test-Path (Join-Path $target "templates")) {
            throw "Templates must not be installed inside agent discovery path"
          }
          if (Test-Path (Join-Path $target "setting-collapse-detector")) {
            throw "Skills must not be installed inside agent discovery path"
          }
          $skillPath = Join-Path $skillTarget "setting-collapse-detector/SKILL.md"
          if (-not (Test-Path $skillPath)) {
            throw "Missing installed skill: $skillPath"
          }
          $requiredTemplates = @(
            "style-guide.md",
            "character-sheet.md",
            "item-sheet.md",
            "location-sheet.md",
            "world-rule-sheet.md",
            "series-bible.md",
            "narrative-state.md",
            "writing-session.md",
            "verification-manifest.md",
            "verification-evidence.md",
            "retcon-proposal.md"
          )
          foreach ($path in $requiredTemplates) {
            $fullPath = Join-Path $templateTarget $path
            if (-not (Test-Path $fullPath)) {
              throw "Missing installed template: $fullPath"
            }
          }
          $project = Join-Path $env:RUNNER_TEMP "opencode-novelist-project"
          New-Item -ItemType Directory -Force -Path $project | Out-Null
          .\install.ps1 --project-dir $project
          $projectTarget = Join-Path $project ".opencode/agents"
          $projectTemplateTarget = Join-Path $project ".opencode/novelist/templates"
          $projectSkillTarget = Join-Path $project ".opencode/skills"
          foreach ($path in $requiredAgents) {
            $fullPath = Join-Path $projectTarget $path
            if (-not (Test-Path $fullPath)) {
              throw "Missing project installed file: $fullPath"
            }
          }
          if (Test-Path (Join-Path $projectTarget "templates")) {
            throw "Project templates must not be installed inside agent discovery path"
          }
          if (Test-Path (Join-Path $projectTarget "setting-collapse-detector")) {
            throw "Project skills must not be installed inside agent discovery path"
          }
          if (-not (Test-Path (Join-Path $projectSkillTarget "setting-collapse-detector/SKILL.md"))) {
            throw "Missing project installed skill"
          }
          if (-not (Test-Path (Join-Path $projectTemplateTarget "verification-manifest.md"))) {
            throw "Missing project installed verification manifest template"
          }
          if (-not (Test-Path (Join-Path $projectTemplateTarget "writing-session.md"))) {
            throw "Missing project installed writing session template"
          }
